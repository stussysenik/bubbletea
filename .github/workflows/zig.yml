name: zig

on:
  push:
    paths:
      - "zig/**"
      - "scripts/update-docs.mjs"
      - "automation/progress.json"
      - "package.json"
      - "package-lock.json"
      - "release.config.cjs"
      - "PROGRESS.md"
      - "README.md"
      - "Taskfile.yaml"
      - ".github/workflows/zig.yml"
  pull_request:
    paths:
      - "zig/**"
      - "scripts/update-docs.mjs"
      - "automation/progress.json"
      - "package.json"
      - "package-lock.json"
      - "release.config.cjs"
      - "PROGRESS.md"
      - "README.md"
      - "Taskfile.yaml"
      - ".github/workflows/zig.yml"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run docs:check

  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - run: cd zig && zig build
      - run: cd zig && zig build test
      - run: cd zig && zig build wasm
